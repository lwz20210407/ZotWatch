name: Daily Watch & RSS

on:
  schedule:
    - cron: "0 2 * * *"  # Beijing time 10:00
  push:
    branches:
      - main
      - codex/dev
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
      ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
      ALTMETRIC_KEY: ${{ secrets.ALTMETRIC_KEY }}
      OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
      CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - name: Ensure data directories
        run: |
          mkdir -p data reports
      - name: Compute cache key suffix
        id: cache-key
        run: echo "CACHE_KEY=$(date +%Y%m)" >> $GITHUB_ENV
      - name: Restore profile cache
        id: cache-profile
        uses: actions/cache@v4
        with:
          path: |
            data/profile.sqlite
            data/faiss.index
            data/profile.json
          key: profile-${{ env.CACHE_KEY }}
      - run: pip install -r requirements.txt
      - name: Build Zotero profile
        if: steps.cache-profile.outputs.cache-hit != 'true'
        run: python -m src.cli profile --full
      - run: python -m src.cli watch --rss --report --top 20
      - name: Prepare Pages
        run: |
          mkdir -p public
          cp -r reports/* public/ || true
          latest_report=$(ls -t public/report*.html 2>/dev/null | head -n 1 || true)
          if [ -n "$latest_report" ]; then
            cp "$latest_report" public/index.html
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - uses: actions/deploy-pages@v4
