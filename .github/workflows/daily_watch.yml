name: Daily Watch & RSS

on:
  schedule:
    - cron: "0 2 * * *"  # Beijing time 10:00
  push:
    branches:
      - main
      - codex/dev
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
      ZOTERO_USER_ID: ${{ secrets.ZOTERO_USER_ID }}
      ALTMETRIC_KEY: ${{ secrets.ALTMETRIC_KEY }}
      OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
      CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
      EMAIL_TO: lwz20210407@njust.edu.cn
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - name: Ensure data directories
        run: |
          mkdir -p data reports
      - name: Compute cache key suffix
        id: cache-key
        run: echo "CACHE_KEY=$(date +%Y%m)" >> $GITHUB_ENV
      - name: Restore profile cache
        id: cache-profile
        uses: actions/cache@v4
        with:
          path: |
            data/profile.sqlite
            data/faiss.index
            data/profile.json
          key: profile-${{ env.CACHE_KEY }}
      - run: pip install -r requirements.txt
      - name: Build Zotero profile
        if: steps.cache-profile.outputs.cache-hit != 'true'
        run: python -m src.cli profile --full
      - run: python -m src.cli watch --rss --report --top 20
      - name: Prepare Pages
        run: |
          mkdir -p public
          cp -r reports/* public/ || true
          latest_report=$(ls -t public/report*.html 2>/dev/null | head -n 1 || true)
          if [ -n "$latest_report" ]; then
            cp "$latest_report" public/index.html
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
      - uses: actions/deploy-pages@v4
      - name: Email digest
        run: |
          python - <<'PY'
          import os
          import smtplib
          import ssl
          from datetime import datetime
          from email.message import EmailMessage
          from pathlib import Path
          from zoneinfo import ZoneInfo

          required = {
              "SMTP_HOST": os.getenv("SMTP_HOST"),
              "SMTP_USERNAME": os.getenv("SMTP_USERNAME"),
              "SMTP_PASSWORD": os.getenv("SMTP_PASSWORD"),
              "EMAIL_TO": os.getenv("EMAIL_TO"),
          }
          missing = [key for key, value in required.items() if not value]
          if missing:
              print(f"Skipping email digest; missing secrets/env: {', '.join(missing)}")
              raise SystemExit(0)

          smtp_host = required["SMTP_HOST"]
          smtp_user = required["SMTP_USERNAME"]
          smtp_password = required["SMTP_PASSWORD"]
          email_to = required["EMAIL_TO"]
          smtp_port = int(os.getenv("SMTP_PORT") or "587")
          smtp_from = os.getenv("SMTP_FROM") or smtp_user

          now = datetime.now(ZoneInfo("Asia/Shanghai"))
          reports = sorted(
              Path("reports").glob("report*.html"),
              key=lambda path: path.stat().st_mtime,
              reverse=True,
          )
          latest_report = reports[0] if reports else None
          feed_path = Path("reports/feed.xml")

          pages_url = "https://lwz20210407.github.io/ZotWatch/"
          feed_url = "https://lwz20210407.github.io/ZotWatch/feed.xml"
          run_url = (
              f"https://github.com/{os.getenv('GITHUB_REPOSITORY')}/actions/runs/"
              f"{os.getenv('GITHUB_RUN_ID')}"
          )

          msg = EmailMessage()
          msg["Subject"] = f"Zotero文献每日推送 - {now:%Y-%m-%d}"
          msg["From"] = smtp_from
          msg["To"] = email_to
          msg.set_content(
              "\n".join(
                  [
                      f"Zotero文献每日推送已更新：{now:%Y-%m-%d %H:%M:%S} 北京时间",
                      "",
                      f"查看今日文献页面：{pages_url}",
                      f"RSS 订阅地址：{feed_url}",
                      f"本次运行记录：{run_url}",
                      f"最新报告文件：{latest_report.name if latest_report else '未生成'}",
                      "",
                      "邮件附件中也包含最新 HTML report 和 feed.xml。",
                  ]
              )
          )

          if latest_report:
              msg.add_attachment(
                  latest_report.read_text(encoding="utf-8"),
                  subtype="html",
                  filename=latest_report.name,
              )
          if feed_path.exists():
              msg.add_attachment(
                  feed_path.read_text(encoding="utf-8"),
                  subtype="xml",
                  filename=feed_path.name,
              )

          if smtp_port == 465:
              with smtplib.SMTP_SSL(smtp_host, smtp_port, context=ssl.create_default_context()) as server:
                  server.login(smtp_user, smtp_password)
                  server.send_message(msg)
          else:
              with smtplib.SMTP(smtp_host, smtp_port) as server:
                  server.starttls(context=ssl.create_default_context())
                  server.login(smtp_user, smtp_password)
                  server.send_message(msg)

          print(f"Sent ZotWatch email digest to {email_to}")
          PY
